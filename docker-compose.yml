version: '3.8'

services:
  # 1. PostgreSQL Service
  db:
    image: postgis/postgis:${POSTGRES_VERSION:-17-3.5}
    container_name: tripjoy-db-postgis
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # Map port từ .env (DB_PORT) vào port mặc định của container (5432)
      - "${DB_PORT}:5432"
    volumes:
      - ${POSTGRES_VOLUME:-tripjoy_postgis_data}:/var/lib/postgresql/data
      - ./scripts/init-postgis.sh:/docker-entrypoint-initdb.d/01-init-postgis.sh
    networks:
      - tripjoy-backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # 2. Redis Service
  cache:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: tripjoy-cache-redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --port 6379
    ports:
      # Map port từ .env (REDIS_PORT) vào port mặc định của container (6379)
      - "${REDIS_PORT}:6379"
    volumes:
      - ${REDIS_VOLUME:-tripjoy_redis_data}:/data
    networks:
      - tripjoy-backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  tripjoy-backend:
    driver: bridge

volumes:
  tripjoy_postgis_data:
  tripjoy_redis_data:
