# ================================================================
# deploy-production.yml — Production Deployment Pipeline
#
# TRIGGER: Push/merge vào branch 'main'
#
# FLOW:
#   main branch ← PR từ staging (manual merge by team lead)
#        │
#        ├─ Job 1: test (mvn verify) — final safety net
#        │
#        ├─ Job 2: build-and-push
#        │     Build Docker image với tags:
#        │       latest (luôn trỏ production mới nhất)
#        │       v1.0.0-<sha> (immutable version tag)
#        │     Push lên Docker Hub
#        │
#        └─ Job 3: deploy-to-production
#              REQUIRES manual approval nếu config GitHub Environment
#              SSH vào EC2 production
#              Rolling restart: pull image → up → health check → done
#
# RULE: Chỉ team lead mới được merge vào main
# ================================================================

name: Deploy — Production

on:
  push:
    branches:
      - main

# Chỉ 1 production deployment tại 1 thời điểm — KHÔNG cancel-in-progress
# Khác với staging: production deployment không bao giờ bị cancel giữa chừng
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ============================================================
  # Job 1: Final Test Gate
  # ============================================================
  test:
    name: Final Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B verify --no-transfer-progress
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test

  # ============================================================
  # Job 2: Build & Push Production Docker Image
  # ============================================================
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version-tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Tạo version tag từ date + short SHA
      # Ví dụ: v20240427-a1b2c3d
      # Pattern này dễ đọc hơn plain SHA, dễ sort theo thời gian
      # ----------------------------------------------------------
      - name: Generate Version Tag
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Production image version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------------
      # Production tags:
      #   - latest           → luôn là production version mới nhất
      #   - v20240427-a1b2c3 → immutable, dùng để rollback
      # ----------------------------------------------------------
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build & Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=main

      # ----------------------------------------------------------
      # Tạo GitHub Release với version tag
      # Giúp team biết version nào đang chạy ở production
      # ----------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Production Deployment
            
            - **Version**: `${{ steps.version.outputs.tag }}`
            - **Docker Image**: `${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api:${{ steps.version.outputs.tag }}`
            - **Commit**: `${{ github.sha }}`
            - **Deployed by**: `${{ github.actor }}`
            - **Deploy time**: `${{ github.event.head_commit.timestamp }}`
            
            ### Rollback Command (nếu cần)
            ```bash
            # SSH vào EC2 production
            IMAGE_TAG=<previous-version-tag> docker compose -f docker-compose.prod.yml up -d tripjoy-api
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 3: Deploy lên EC2 Production
  # ============================================================
  deploy-to-production:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # environment: production → Có thể config require manual approval trong GitHub Settings
    # Settings → Environments → production → Required reviewers
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 600s # Tăng lên 10 phút để tránh bị timeout SSH
          script: |
            set -e
            
            echo "Setting up production directory..."
            mkdir -p ~/tripjoy-prod
            cd ~/tripjoy-prod
            
            echo "Pulling latest configs from main..."
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone -b main https://github.com/${{ github.repository }}.git .
            fi
            
            echo "Writing production .env..."
            echo "${{ secrets.ENV_PROD }}" | base64 -d > .env
            echo "" >> .env 
            
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            echo "Pulling new Docker image..."
            IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }} DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml pull tripjoy-api
            
            echo "Restarting containers..."
            IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }} DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Waiting for API to start (polling every 10s, up to 5 minutes)..."
            MAX_RETRIES=30
            RETRY_COUNT=0
            HEALTH="DOWN"
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              # Dùng curl + grep để bắt chuỗi "status":"UP"
              if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                HEALTH="UP"
                break
              fi
              echo "API not ready yet. Retrying in 10s... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ "$HEALTH" = "UP" ]; then
              echo "Production deployment successful! Health: UP"
            else
              echo "Health check timeout! API did not start within 5 minutes."
              echo "Fetching recent logs for debugging:"
              docker logs tripjoy-prod-api --tail 50
              echo "Consider rollback: docker compose -f docker-compose.prod.yml up -d --scale tripjoy-api=0"
              exit 1
            fi
            
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "Production containers status:"
            docker compose -f docker-compose.prod.yml ps

      # ----------------------------------------------------------
      # Notify team via Slack (optional - uncomment khi có Slack webhook)
      # ----------------------------------------------------------
      # - name: Notify Slack
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      #     SLACK_MESSAGE: "Production deployment ${{ job.status == 'success' && 'succeeded' || 'failed' }}: ${{ needs.build-and-push.outputs.version-tag }}"
