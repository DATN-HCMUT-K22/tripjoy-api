# ================================================================
# deploy-production.yml — Production Deployment Pipeline
#
# TRIGGER: Push/merge to branch 'main'
#
# FLOW:
#   main branch ← PR from staging (manual merge by team lead)
#        │
#        ├─ Job 1: test (mvn verify) — final safety net
#        │
#        ├─ Job 2: build-and-push
#        │     Build Docker image with tags:
#        │       latest (always points to the latest production)
#        │       v1.0.0-<sha> (immutable version tag)
#        │     Push to Docker Hub
#        │
#        └─ Job 3: deploy-to-production
#              SSH into EC2 production
#              Rolling restart: pull image → up → health check → done
#
# RULE: Only team lead is allowed to merge into main
# ================================================================

name: Deploy — Production

on:
  push:
    branches:
      - main

# Allow only one production deployment at a time - NO cancel-in-progress
# Production deployments should never be cancelled mid-way
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ============================================================
  # Job 1: Final Test Gate
  # ============================================================
  test:
    name: Final Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B verify --no-transfer-progress
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test

  # ============================================================
  # Job 2: Build & Push Production Docker Image
  # ============================================================
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version-tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Generate version tag from date + short SHA
      # Example: v20240427-a1b2c3d
      # ----------------------------------------------------------
      - name: Generate Version Tag
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Production image version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------------
      # Production tags:
      #   - latest           → always the latest production version
      #   - v20240427-a1b2c3 → immutable, used for rollbacks
      # ----------------------------------------------------------
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build & Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=main

      # ----------------------------------------------------------
      # Create GitHub Release with version tag
      # ----------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Production Deployment
            
            - **Version**: `${{ steps.version.outputs.tag }}`
            - **Docker Image**: `${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api:${{ steps.version.outputs.tag }}`
            - **Commit**: `${{ github.sha }}`
            - **Deployed by**: `${{ github.actor }}`
            - **Deploy time**: `${{ github.event.head_commit.timestamp }}`
            
            ### Rollback Command (if needed)
            ```bash
            # SSH into EC2 production
            IMAGE_TAG=<previous-version-tag> docker compose -f docker-compose.prod.yml up -d tripjoy-api
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 3: Deploy to EC2 Production
  # ============================================================
  deploy-to-production:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -e
            
            echo "Setting up production directory..."
            mkdir -p ~/tripjoy-prod
            cd ~/tripjoy-prod
            
            echo "Syncing production configurations..."
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone -b main https://github.com/${{ github.repository }}.git .
            fi
            
            echo "Generating environment file..."
            echo "${{ secrets.ENV_PROD }}" | base64 -d > .env
            echo "" >> .env 
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            echo "Pulling latest production image..."
            IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }} DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml pull tripjoy-api
            
            echo "Restarting production containers..."
            IMAGE_TAG=${{ needs.build-and-push.outputs.version-tag }} DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Starting health check loop (5-minute timeout)..."
            # Extract port from .env or default to 8080
            P_PORT=$(grep "API_PUBLISHED_PORT" .env | awk -F'=' '{print $2}' | tr -d '\r ' || echo "8080")
            P_PORT=${P_PORT:-8080}
            HEALTH_URL="http://127.0.0.1:$P_PORT/actuator/health"
            
            MAX_RETRIES=30
            RETRY_COUNT=0
            HEALTH="DOWN"
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              RESPONSE=$(curl -s "$HEALTH_URL" || echo "CONNECTION ERROR")
              echo "Attempt $((RETRY_COUNT+1)): Health check response: $RESPONSE"
              if echo "$RESPONSE" | grep -q '"status":"UP"'; then
                HEALTH="UP"
                break
              fi
              echo "API not ready yet. Retrying in 10s..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ "$HEALTH" = "UP" ]; then
              echo "Production deployment successful! Health: UP"
            else
              echo "Deployment failed! Production API did not start within timeout."
              echo "Container status:"
              docker ps --filter "name=tripjoy-prod"
              echo "Recent logs:"
              docker logs tripjoy-prod-api --tail 100 || true
              exit 1
            fi
            
            echo "Cleaning up dangling images..."
            docker image prune -f
            
            echo "Final service status:"
            docker compose -f docker-compose.prod.yml ps
