# ================================================================
# pr-check.yml — Pull Request Quality Gate
#
# TRIGGER: Khi mở PR vào branch staging hoặc main
#
# MỤC ĐÍCH:
#   Đảm bảo code KHÔNG được merge trừ khi:
#   1. Tất cả unit tests pass
#   2. SonarCloud Quality Gate pass (không có critical bugs/smells)
#
# KHÔNG deploy bất cứ thứ gì trong workflow này.
# ================================================================

name: PR Quality Check

on:
  pull_request:
    branches:
      - staging   # Mọi PR từ feat/*, fix/*, v.v. vào staging
      - main      # PR từ staging vào main (release gate)
    # Trigger khi mở PR, cập nhật code, hoặc reopen
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Job: Test & Analyze
  # Chạy tests và SonarCloud scan trên cùng một job để dùng chung report
  # ============================================================
  test-and-analyze:
    name: Test & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------
      # Step 1: Checkout code
      # fetch-depth: 0 → clone toàn bộ history
      # SonarCloud cần full history để tính blame, new code, v.v.
      # ----------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------
      # Step 2: Setup JDK 21
      # distribution: temurin → Eclipse Temurin (cùng với Dockerfile)
      # cache: maven → tự động cache ~/.m2 dựa trên pom.xml hash
      # ----------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ----------------------------------------------------------
      # Step 3: Cache SonarCloud packages
      # Tăng tốc scan bằng cách cache scanner rules
      # ----------------------------------------------------------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ----------------------------------------------------------
      # Step 4: Run Tests + Generate JaCoCo Coverage Report
      #
      # -Pcoverage: kích hoạt Maven profile để bật JaCoCo plugin
      # JaCoCo tạo report XML → SonarCloud đọc để tính coverage %
      #
      # NOTE: Tests đang dùng cơ sở dữ liệu thật? Cần H2 in-memory.
      # Nếu test fail vì thiếu DB/Redis → uncomment phần services bên dưới.
      # ----------------------------------------------------------
      - name: Run Tests
        run: mvn -B verify --no-transfer-progress
        env:
          # Biến môi trường giả cho tests (application.yaml đọc các biến này)
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test

      # ----------------------------------------------------------
      # Step 5: SonarCloud Analysis
      #
      # Sonar đọc test results + coverage từ target/ directory
      # Gửi dữ liệu lên sonarcloud.io để phân tích
      # ----------------------------------------------------------
      - name: SonarCloud Analysis
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Biến môi trường cần để sonar chạy được mvn compile bên trong
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test
