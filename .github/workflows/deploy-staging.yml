# ================================================================
# deploy-staging.yml — Staging Deployment Pipeline
#
# TRIGGER: Push/merge to branch 'staging'
#
# FLOW:
#   staging branch ← merge from feat/fix/perform/refactor/*
#        │
#        ├─ Job 1: test (mvn verify)
#        │
#        ├─ Job 2: build-and-push
#        │     Build Docker image with tag 'staging'
#        │     Push to Docker Hub
#        │
#        └─ Job 3: deploy-to-staging
#              SSH into EC2 staging
#              Pull new image + restart containers
#
# RESULT: EC2 staging runs the latest commit from the staging branch
# ================================================================

name: Deploy — Staging

on:
  push:
    branches:
      - staging

# Allow only one staging deployment at a time
# Concurrency group prevents race conditions during multiple rapid pushes
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Test
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B verify -DskipTests=false --no-transfer-progress
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test

  # ============================================================
  # Job 2: Build Docker Image and Push to Docker Hub
  # ============================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Run only if tests pass

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Set up QEMU + Buildx for multi-platform support
      # ----------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------
      # Login to Docker Hub
      # ----------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------------
      # Generate Docker metadata (tags + labels)
      # Staging image will have 2 tags:
      #   - staging           (always points to the latest staging commit)
      #   - staging-<sha>     (immutable tag for traceability)
      # ----------------------------------------------------------
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      # ----------------------------------------------------------
      # Build and Push multi-platform image with caching
      # ----------------------------------------------------------
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=staging

  # ============================================================
  # Job 3: Deploy to EC2 Staging
  # ============================================================
  deploy-to-staging:
    name: Deploy to Staging EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout (for docker-compose files)
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # SSH into EC2, pull latest configs, pull image, and restart
      # ----------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -e  
            
            echo "Setting up staging directory..."
            mkdir -p ~/tripjoy-staging
            cd ~/tripjoy-staging
            
            echo "Syncing docker configurations..."
            if [ -d ".git" ]; then
              git pull origin staging
            else
              git clone -b staging https://github.com/${{ github.repository }}.git .
            fi
            
            echo "Generating environment file..."
            echo "${{ secrets.ENV_STAGING }}" | base64 -d > .env
            echo "" >> .env 
            echo "IMAGE_TAG=staging" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            echo "Pulling latest staging image..."
            IMAGE_TAG=staging DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml pull tripjoy-api
            
            echo "Restarting staging services..."
            IMAGE_TAG=staging DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Starting health check loop (5-minute timeout)..."
            # Extract port from .env or default to 8080
            ST_PORT=$(grep "API_PUBLISHED_PORT" .env | awk -F'=' '{print $2}' | tr -d '\r ' || echo "8080")
            ST_PORT=${ST_PORT:-8080}
            HEALTH_URL="http://127.0.0.1:$ST_PORT/actuator/health"
            
            MAX_RETRIES=30
            RETRY_COUNT=0
            HEALTH="DOWN"
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              RESPONSE=$(curl -s "$HEALTH_URL" || echo "CONNECTION ERROR")
              echo "Attempt $((RETRY_COUNT+1)): Health check response: $RESPONSE"
              if echo "$RESPONSE" | grep -q '"status":"UP"'; then
                HEALTH="UP"
                break
              fi
              echo "API not ready yet. Retrying in 10s..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ "$HEALTH" = "UP" ]; then
              echo "Staging deployment successful! Health: UP"
            else
              echo "Deployment failed! Staging API did not start within timeout."
              echo "Container status:"
              docker ps --filter "name=tripjoy-staging"
              echo "Recent logs:"
              docker logs tripjoy-staging-api --tail 100 || true
              exit 1
            fi
            
            echo "Cleaning up dangling images..."
            docker image prune -f