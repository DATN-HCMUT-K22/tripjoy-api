# ================================================================
# deploy-staging.yml — Staging Deployment Pipeline
#
# TRIGGER: Push/merge vào branch 'staging'
#
# FLOW:
#   staging branch ← merge từ feat/fix/perform/refactor/*
#        │
#        ├─ Job 1: test (mvn verify)
#        │
#        ├─ Job 2: build-and-push
#        │     Build Docker image với tag 'staging'
#        │     Push lên Docker Hub
#        │
#        └─ Job 3: deploy-to-staging
#              SSH vào EC2 staging
#              Pull image mới + restart containers
#
# RESULT: EC2 staging chạy commit mới nhất của branch staging
# ================================================================

name: Deploy — Staging

on:
  push:
    branches:
      - staging

# Chỉ cho phép 1 deployment staging chạy tại một thời điểm
# concurrency group ngăn race condition khi nhiều commit push liên tục
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Test
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn -B verify -DskipTests=false --no-transfer-progress
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tripjoy_test
          DB_USERNAME: postgres
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_password
          JWT_SIGNER_KEY: test_jwt_signer_key_must_be_at_least_32_chars
          JWT_EXPIRATION: 3600
          JWT_REFRESH_EXPIRATION: 360000
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GOOGLE_PLACES_API_KEY: test
          AI_SERVICE_API_KEY: test
          SOCKET_HOST: localhost
          SOCKET_PORT: 8085
          SWAGGER_SERVER_URL: http://localhost:8080
          SWAGGER_SERVER_DESCRIPTION: Test

  # ============================================================
  # Job 2: Build Docker Image và Push lên Docker Hub
  # ============================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Chỉ chạy nếu tests pass

    outputs:
      # Output image tag để job deploy dùng
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Set up QEMU + Buildx để hỗ trợ multi-platform builds
      # Cần thiết nếu EC2 dùng ARM (t4g) thay vì AMD64 (t3)
      # ----------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------
      # Login vào Docker Hub
      # DOCKERHUB_USERNAME và DOCKERHUB_TOKEN được set trong GitHub Secrets
      # ----------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------------
      # Tạo metadata (tags + labels) cho Docker image
      # Staging image sẽ có 2 tags:
      #   - staging           (luôn trỏ vào commit staging mới nhất)
      #   - staging-<sha>     (immutable tag để trace back)
      # ----------------------------------------------------------
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tripjoy-api
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      # ----------------------------------------------------------
      # Build và Push multi-platform image
      # cache-from/to: tận dụng Docker layer cache từ lần build trước
      # → Giảm thời gian build từ ~5 phút xuống ~1-2 phút
      # ----------------------------------------------------------
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args: truyền thông tin build vào image
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=staging

  # ============================================================
  # Job 3: Deploy lên EC2 Staging
  # ============================================================
  deploy-to-staging:
    name: Deploy to Staging EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    # environment: staging → link với GitHub Environments để có approval gate (optional)
    environment: staging

    steps:
      - name: Checkout (để lấy docker-compose files)
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Copy docker-compose và config files lên EC2
      # Sau đó SSH vào và pull image mới + restart services
      # ----------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          timeout: 600s # Tăng lên 10 phút
          script: |
            set -e  
            
            echo "Creating deploy directory..."
            mkdir -p ~/tripjoy-staging
            cd ~/tripjoy-staging
            
            echo "Pulling latest code for docker configs..."
            if [ -d ".git" ]; then
              git pull origin staging
            else
              git clone -b staging https://github.com/${{ github.repository }}.git .
            fi
            
            echo "Writing .env file from GitHub Secret..."
            echo "${{ secrets.ENV_STAGING }}" | base64 -d > .env
            echo "" >> .env 
            
            echo "IMAGE_TAG=staging" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            
            echo "Pulling new Docker image..."
            IMAGE_TAG=staging DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml pull tripjoy-api
            
            echo "Restarting services..."
            IMAGE_TAG=staging DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Waiting for Staging API to start (polling every 10s, up to 5 minutes)..."
            # Lấy API_PUBLISHED_PORT từ .env, mặc định 8080 nếu không có
            STAGING_PORT=$(grep "^API_PUBLISHED_PORT=" .env | cut -d'=' -f2 | tr -d '\r' || echo "8080")
            STAGING_PORT=${STAGING_PORT:-8080}
            echo "Checking health on localhost:$STAGING_PORT..."

            MAX_RETRIES=30
            RETRY_COUNT=0
            HEALTH="DOWN"
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:$STAGING_PORT/actuator/health | grep -q '"status":"UP"'; then
                HEALTH="UP"
                break
              fi
              echo "Staging API not ready yet. Retrying in 10s... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ "$HEALTH" = "UP" ]; then
              echo "Staging deployment successful! Health: UP"
            else
              echo "Health check timeout! Staging API did not start within 5 minutes."
              docker logs tripjoy-staging-api --tail 50 || true
              exit 1
            fi
            
            echo "Cleaning up old images..."
            docker image prune -f