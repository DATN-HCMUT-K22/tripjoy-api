# ==================== TRIPJOY REDIS CONFIGURATION ====================
# Optimized for dual-purpose usage:
# - Database 0: Socket.IO (Redisson) - Critical real-time data
# - Database 1: Application Cache (@Cacheable) - Ephemeral data with TTL

# --- 1. NETWORK & SECURITY ---
bind 0.0.0.0
# Port sẽ được map từ docker, trong container cứ để mặc định hoặc theo biến cmd
port 6379
protected-mode yes

# --- 2. MEMORY MANAGEMENT ---
# Giới hạn RAM (Có thể override bằng lệnh nếu muốn, nhưng để đây cũng ổn)
maxmemory 512mb

# QUAN TRỌNG: volatile-lru chỉ xóa keys có TTL
# -> Bảo vệ dữ liệu Socket.IO (DB 0, không có TTL)
# -> Chỉ xóa Cache (DB 1, có TTL khi dùng @Cacheable)
maxmemory-policy volatile-lru

# --- 3. PERSISTENCE (AOF - An toàn dữ liệu) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# --- 4. RDB (Snapshot Backup) ---
# 1 thay đổi trong 15 phút -> Lưu
save 900 1
# 10 thay đổi trong 5 phút -> Lưu
save 300 10
# 10.000 thay đổi trong 1 phút -> Lưu
save 60 10000

# --- 5. PERFORMANCE ---
maxclients 10000
tcp-keepalive 300

# --- 6. DATABASE ---
# Đảm bảo có đủ DB (DB 0 = Socket.IO, DB 1 = Cache)
databases 16

# --- 7. LOGGING ---
loglevel notice
