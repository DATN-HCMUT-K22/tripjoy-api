# ================================================================
# SonarCloud Project Configuration — sonar-project.properties
#
# File này được đọc bởi Maven Sonar Plugin khi chạy:
#   mvn sonar:sonar
#
# Các giá trị có thể được override bằng -D flags trên command line
# (GitHub Actions workflow đã override projectKey và organization)
# ================================================================

# ------------------------------------------------------------------
# THAY ĐỔI CÁC GIÁ TRỊ NÀY khi setup SonarCloud:
# 1. Vào https://sonarcloud.io
# 2. Tạo project mới → lấy Project Key và Organization Key
# ------------------------------------------------------------------

# Project Key: unique identifier trên SonarCloud
# Format: <org-key>_<project-name>
sonar.projectKey=dinhduc0794_tripjoy-api

# Organization Key: tên organization trên SonarCloud
sonar.organization=dinhduc0794

# Project display name
sonar.projectName=TripJoy API

# Project version (tự động lấy từ pom.xml nếu không set)
# sonar.projectVersion=1.0.0

# ------------------------------------------------------------------
# Source Code Configuration
# ------------------------------------------------------------------

# Thư mục chứa source code Java
sonar.sources=src/main/java

# Thư mục chứa test code (Sonar tính coverage từ đây)
sonar.tests=src/test/java

# Bao gồm các file này khi phân tích
sonar.inclusions=**/*.javaso

# Loại trừ các file/package không cần phân tích
# - **/dto/**        : DTO classes ít logic
# - **/entity/**     : JPA Entities ít logic nghiệp vụ
# - **/mapper/**     : MapStruct generated code
# - **/configuration/**: Config classes (Spring beans setup)
sonar.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/mapper/**,\
  **/configuration/**,\
  **/exception/**,\
  **/*Application.java

# Loại trừ test files khỏi phân tích main source
sonar.test.exclusions=src/test/**

# ------------------------------------------------------------------
# Coverage Report
# JaCoCo XML report được đọc bởi SonarCloud để tính coverage %
# ------------------------------------------------------------------
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Loại trừ DTOs, Entities khỏi coverage requirement
# (vì chúng không cần unit test riêng)
# sonar.coverage.exclusions=\
#   **/dto/**,\
#   **/entity/**,\
#   **/mapper/**,\
#   **/configuration/**,\
#   **/exception/**,\
#   **/*Application.java
sonar.coverage.exclusions=**/*.java

# ------------------------------------------------------------------
# Java Version
# ------------------------------------------------------------------
sonar.java.source=21

# ------------------------------------------------------------------
# Encoding
# ------------------------------------------------------------------
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------------
# Quality Gate Thresholds (configure trên SonarCloud UI, không phải ở đây)
# Best practice thresholds:
#   - Coverage: >= 70%
#   - Duplicated Lines: <= 3%
#   - Maintainability Rating: A
#   - Reliability Rating: A
#   - Security Rating: A
#   - New Bugs: 0
#   - New Vulnerabilities: 0
# ------------------------------------------------------------------
