spring:
  application:
    name: tripjoy-api-test
  datasource:
    url: jdbc:h2:mem:tripjoy_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS TSVECTOR AS VARCHAR(1000)\;CREATE DOMAIN IF NOT EXISTS GEOMETRY AS VARCHAR(1000)\;CREATE DOMAIN IF NOT EXISTS JSONB AS VARCHAR(10000)\;CREATE DOMAIN IF NOT EXISTS JSON AS VARCHAR(10000)
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: none
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
      password: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfiguration

jwt:
  signer-key: "day-la-mot-chuoi-bi-mat-gia-dung-de-chay-test-chong-loi-123"
  expiration: 86400000          # 1 ngày
  refresh-expiration: 604800000 # 7 ngày