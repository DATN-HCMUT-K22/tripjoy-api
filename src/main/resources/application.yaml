server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tripjoy-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tripjoy}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2210794}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        enable_lazy_load_no_trans: true
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
    show-sql: ${HIBERNATE_SHOW_SQL:true}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

socket-server:
  host: ${SOCKET_HOST:localhost}
  port: ${SOCKET_PORT:8085}

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  expiration: ${JWT_EXPIRATION:3600}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:360000}

api:
  swagger:
    info:
      title: Tripjoy API Service Documentation
      version: v1.0.0
      description: This API exposes Tripjoy endpoints.
      license:
        name: API License
        url: https://springdoc.org
      contact:
        name: Nguyen Dinh Duc
        email: dinhduc0794.work@gmail.com
        url: https://www.linkedin.com/in/dinhduc0794
    servers:
      - url: ${SWAGGER_SERVER_URL:http://localhost:8080}
        description: ${SWAGGER_SERVER_DESCRIPTION:Current Environment}