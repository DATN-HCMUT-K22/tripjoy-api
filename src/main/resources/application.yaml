server:
  port: ${SERVER_PORT:8080}

# ================================================================
# DevOps: Actuator + Prometheus Metrics
# Prometheus sẽ scrape tại: http://<host>:8080/actuator/prometheus
# ================================================================
management:
  endpoints:
    web:
      exposure:
        # Chỉ expose những endpoint cần thiết — tránh lộ thông tin nhạy cảm
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      # show-details: always → thấy chi tiết DB/Redis health (chỉ dùng trong nội bộ)
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      # Tag này giúp Grafana filter metric theo từng app khi nhiều service chạy chung cluster
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        # Cho phép tính p50, p90, p99 latency của HTTP requests
        http.server.requests: true

spring:
  application:
    name: tripjoy-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # URL được xây dựng động hoàn toàn
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        enable_lazy_load_no_trans: true
        format_sql: false
    show-sql: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    web:
      pageable:
        serialization-mode: via-dto
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 1  # Cache layer uses DB 1, Socket.IO uses DB 0

socket-server:
  host: ${SOCKET_HOST}
  port: ${SOCKET_PORT}

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

api:
  swagger:
    info:
      title: Tripjoy API
      version: v1.0.0
    servers:
      dev:
        url: ${SWAGGER_SERVER_URL}
        description: ${SWAGGER_SERVER_DESCRIPTION}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  api-key: ${AI_SERVICE_API_KEY:default_dev_key}
  timeout-seconds: 120
  connect-timeout-seconds: 10

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:default_dev_key}
  timeout-seconds: 120
  connect-timeout-seconds: 10

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        recordExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.GatewayTimeout
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadGateway
  retry:
    instances:
      aiService:
        maxAttempts: 3
        waitDuration: 2s
        retryExceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.GatewayTimeout
          - org.springframework.web.reactive.function.client.WebClientResponseException.BadGateway
